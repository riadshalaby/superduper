services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "kafka-topics --bootstrap-server kafka:29092
      --create --if-not-exists --topic superduper.example
      --partitions 3 --replication-factor 1"
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: superduper
      POSTGRES_PASSWORD: superduper
      POSTGRES_USER: superduper
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superduper -d superduper"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  seeder-1:
    build:
      context: ./examples/seeder
      dockerfile: Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      SUPERDUPER_SEEDER_BOOTSTRAP_SERVERS: kafka:29092
      SUPERDUPER_SEEDER_TOPIC: superduper.example
      SUPERDUPER_SEEDER_COUNT: ${SUPERDUPER_SEEDER_COUNT:-1000}
      SUPERDUPER_SEEDER_KEYS: 20
      SUPERDUPER_SEEDER_INSTANCE_ID: seeder-1
    restart: "no"

  seeder-2:
    build:
      context: ./examples/seeder
      dockerfile: Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      SUPERDUPER_SEEDER_BOOTSTRAP_SERVERS: kafka:29092
      SUPERDUPER_SEEDER_TOPIC: superduper.example
      SUPERDUPER_SEEDER_COUNT: ${SUPERDUPER_SEEDER_COUNT:-1000}
      SUPERDUPER_SEEDER_KEYS: 20
      SUPERDUPER_SEEDER_INSTANCE_ID: seeder-2
    restart: "no"

  seeder-3:
    build:
      context: ./examples/seeder
      dockerfile: Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      SUPERDUPER_SEEDER_BOOTSTRAP_SERVERS: kafka:29092
      SUPERDUPER_SEEDER_TOPIC: superduper.example
      SUPERDUPER_SEEDER_COUNT: ${SUPERDUPER_SEEDER_COUNT:-1000}
      SUPERDUPER_SEEDER_KEYS: 20
      SUPERDUPER_SEEDER_INSTANCE_ID: seeder-3
    restart: "no"

  worker-1:
    build:
      context: ./examples/app-blocking
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/superduper
      SPRING_DATASOURCE_USERNAME: superduper
      SPRING_DATASOURCE_PASSWORD: superduper
      SUPERDUPER_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUPERDUPER_KAFKA_GROUP_ID: example-blocking
      SUPERDUPER_EXAMPLE_SEED_ENABLED: "false"

  worker-2:
    build:
      context: ./examples/app-blocking
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/superduper
      SPRING_DATASOURCE_USERNAME: superduper
      SPRING_DATASOURCE_PASSWORD: superduper
      SUPERDUPER_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUPERDUPER_KAFKA_GROUP_ID: example-blocking
      SUPERDUPER_EXAMPLE_SEED_ENABLED: "false"

  worker-3:
    build:
      context: ./examples/app-blocking
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/superduper
      SPRING_DATASOURCE_USERNAME: superduper
      SPRING_DATASOURCE_PASSWORD: superduper
      SUPERDUPER_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUPERDUPER_KAFKA_GROUP_ID: example-blocking
      SUPERDUPER_EXAMPLE_SEED_ENABLED: "false"
