name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Spotless check
        run: mvn -q spotless:check

      - name: Compile
        run: mvn -q -DskipTests test-compile

      - name: Test
        run: mvn -T 1C test

      - name: Verify coverage
        run: mvn -q -DskipTests verify

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ github.run_id }}
          path: |
            **/target/classes/**
            **/target/test-classes/**
            **/target/jacoco.exec
            **/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            **/target/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-${{ github.run_id }}
          path: |
            **/target/site/jacoco/**
            **/target/site/jacoco-aggregate/**
          if-no-files-found: ignore
          retention-days: 14

  sonar:
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ needs.build.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs-${{ github.run_id }}
          path: .

      - name: Skip Sonar when token is missing
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping Sonar analysis on main."

      - name: Sonar analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -DskipTests sonar:sonar

      - name: Check Sonar quality gate
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        run: |
          task_file="$(find . -path '*/target/sonar/report-task.txt' | head -n1)"
          if [[ -z "$task_file" ]]; then
            echo "::warning::Could not find Sonar report-task.txt; skipping quality gate lookup."
            exit 1
          fi

          ce_task_url="$(grep '^ceTaskUrl=' "$task_file" | cut -d= -f2-)"
          dashboard_url="$(grep '^dashboardUrl=' "$task_file" | cut -d= -f2-)"
          analysis_id=""

          for attempt in $(seq 1 12); do
            response="$(curl -fsS -u "$SONAR_TOKEN:" "$ce_task_url")"
            task_status="$(printf '%s' "$response" | jq -r '.task.status // "UNKNOWN"')"
            analysis_id="$(printf '%s' "$response" | jq -r '.task.analysisId // empty')"

            if [[ "$task_status" == "SUCCESS" && -n "$analysis_id" ]]; then
              break
            fi

            if [[ "$task_status" == "FAILED" || "$task_status" == "CANCELED" ]]; then
              echo "::warning::Sonar background task finished with status '$task_status'. See $dashboard_url"
              printf '%s\n' "$response"
              exit 1
            fi

            sleep 5
          done

          if [[ -z "$analysis_id" ]]; then
            echo "::warning::Sonar quality gate status was not ready in time. See $dashboard_url"
            exit 1
          fi

          gate_response="$(curl -fsS -u "$SONAR_TOKEN:" "https://sonarcloud.io/api/qualitygates/project_status?analysisId=$analysis_id")"
          gate_status="$(printf '%s' "$gate_response" | jq -r '.projectStatus.status // "UNKNOWN"')"

          if [[ "$gate_status" == "OK" ]]; then
            echo "Sonar quality gate PASSED: $dashboard_url"
            exit 0
          fi

          echo "::warning::Sonar quality gate FAILED with status '$gate_status'. See $dashboard_url"
          printf '%s\n' "$gate_response"
          exit 1

  release-please:
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ needs.build.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
      - release-please
    if: ${{ needs.build.result == 'success' && needs.release-please.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
      MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN

      - name: Verify release secrets are present
        run: |
          test -n "$MAVEN_CENTRAL_USERNAME"
          test -n "$MAVEN_CENTRAL_TOKEN"
          test -n "$MAVEN_GPG_KEY"
          test -n "$MAVEN_GPG_PASSPHRASE"

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs-${{ github.run_id }}
          path: .

      - name: Publish to Maven Central
        run: mvn -B -Prelease -DskipTests deploy
