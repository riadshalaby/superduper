name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Spotless check
        run: mvn -q spotless:check

      - name: Compile
        run: mvn -q -DskipTests test-compile

      - name: Test
        run: mvn -T 1C test

      - name: Generate JaCoCo reports
        run: mvn jacoco:report

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ github.run_id }}
          path: |
            **/target/classes/**
            **/target/test-classes/**
            **/target/jacoco.exec
            **/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            **/target/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-${{ github.run_id }}
          path: |
            **/target/site/jacoco/**
          if-no-files-found: ignore
          retention-days: 14

  sonar:
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ needs.build.result == 'success' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs-${{ github.run_id }}
          path: .

      - name: Sonar analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -DskipTests sonar:sonar -Dsonar.qualitygate.wait=true
