name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-main-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Verify successful CI run for tagged main commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              event: 'push',
              per_page: 100,
            });

            const run = runs.find((candidate) => candidate.head_sha === sha);

            if (!run) {
              core.setFailed(`No CI run for main found for tagged commit ${sha}. Push the tag only after CI on main has completed successfully.`);
              return;
            }

            if (run.status !== 'completed') {
              core.setFailed(`CI run ${run.html_url} for tagged commit ${sha} is still ${run.status}.`);
              return;
            }

            if (run.conclusion !== 'success') {
              core.setFailed(`CI run ${run.html_url} for tagged commit ${sha} concluded with '${run.conclusion}'.`);
              return;
            }

            core.info(`Verified successful CI run ${run.html_url} for tagged commit ${sha}.`);

  publish:
    runs-on: ubuntu-latest
    needs:
      - verify-main-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Verify tag builds
        run: mvn -q -DskipTests test-compile

      - name: Maven Central publish placeholder
        run: echo "Publishing will be implemented in T-005."
