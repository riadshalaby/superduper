changelog:
  categories:
    - title: Features
      labels:
        - feat
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - fix
        - bugfix
        - bug
    - title: Performance
      labels:
        - perf
        - performance
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Breaking Changes
      labels:
        - breaking
        - breaking-change
  exclude:
    labels:
      - skip-changelog
      - chore
      - test
      - ci
      - refactor
