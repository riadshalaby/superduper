spring:
  application:
    name: superduper-example-reactive
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/superduper
    username: superduper
    password: superduper
  liquibase:
    change-log: classpath:db/changelog/superduper/db.changelog-master.yaml
    url: jdbc:postgresql://localhost:5432/superduper
    user: superduper
    password: superduper

superduper:
  consumer:
    type: reactor # selects reactive worker stack; Kafka consumer is still Spring Kafka
  kafka:
    bootstrap-servers: localhost:9092
    group-id: example-reactive
    topic: superduper.example
  worker:
    batch-size: 250
    max-retries: 3
    claim-interval-ms: 500
  example:
    seed:
      enabled: true
      count: 1000
      keys: 20
      await-timeout-seconds: 180
      readiness-timeout-seconds: 30

logging:
  level:
    root: INFO
