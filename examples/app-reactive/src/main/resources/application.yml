spring:
  application:
    name: superduper-example-reactive
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/superduper}
    username: ${SPRING_R2DBC_USERNAME:superduper}
    password: ${SPRING_R2DBC_PASSWORD:superduper}
  liquibase:
    change-log: classpath:db/changelog/superduper/db.changelog-master.yaml
    url: ${SPRING_LIQUIBASE_URL:jdbc:postgresql://localhost:5432/superduper}
    user: ${SPRING_LIQUIBASE_USER:superduper}
    password: ${SPRING_LIQUIBASE_PASSWORD:superduper}

superduper:
  consumer:
    type: reactor # selects reactive worker stack; Kafka consumer is still Spring Kafka
    max-poll-records: 500
  observability:
    enabled: true
    outputs:
      metrics:
        enabled: true
  kafka:
    bootstrap-servers: ${SUPERDUPER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    group-id: example-reactive
    topic: superduper.example
  # Multi-topic mode replaces superduper.kafka.topic with superduper.topics:
  # topics:
  #   orders:
  #     kafka-topic: orders.events
  #     handler: exampleReactiveMessageHandler
  #   invoices:
  #     kafka-topic: invoices.events
  #     handler: exampleReactiveMessageHandler
  #     table: invoices_messages
  worker:
    max-retries: 3
    claim-interval-ms: 2000
    batch-size: 500
    queue-health:
      enabled: true
      interval-ms: 30000
    retention:
      enabled: true
      processed-retention-days: 14
      stopped-retention-days: 30
      heartbeat-retention-days: 1
      interval-ms: 86400000
  example:
    seed:
      enabled: false
      count: 1000
      keys: 20
      await-timeout-seconds: 180
      readiness-timeout-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
