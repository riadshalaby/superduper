databaseChangeLog:
  - include:
      file: db/changelog/superduper/db.changelog-infra.yaml
  - property:
      name: table.name
      value: messages
      global: false
  - changeSet:
      id: 003-init-messages-postgres
      author: superduper
      dbms: postgresql
      changes:
        - sqlFile:
            path: db/changelog/superduper/topic-messages-template-postgres.sql
            relativeToChangelogFile: false
  - changeSet:
      id: 004-init-messages-mariadb
      author: superduper
      dbms: mariadb
      changes:
        - sqlFile:
            path: db/changelog/superduper/topic-messages-template-mariadb.sql
            relativeToChangelogFile: false
  - changeSet:
      id: 005-mariadb-content-longtext
      author: superduper
      dbms: mariadb
      changes:
        - sqlFile:
            path: db/changelog/superduper/005-mariadb-content-longtext.sql
            relativeToChangelogFile: false
